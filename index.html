<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국그림책출판협회-KOREA PICTURE BOOK PUBLISHERS ASSOCIATION</title>
    <style>
        /* 1. 화면 전체를 중앙 정렬 상태로 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* 가로 중앙 */
            align-items: center;     /* 세로 중앙 */
            min-height: 100vh;      /* 화면 높이를 브라우저 꽉 차게 설정 */
            background-color: #ffffff; /* 배경색 (선택사항) */
        }

        /* 컨테이너 설정 */
        .container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 40px; 
            padding: 20px;
            max-width: 1200px;
            width: 100%; /* 너비를 꽉 채워야 가운데 정렬이 잘 보임 */
        }

        /* 각 칸 설정 */
        .item {
            display: flex;
            justify-content: center;
            flex: 0 1 auto; /* 원본 사이즈 유지를 위해 너비 자동 설정 */
            box-sizing: border-box;
        }

        /* 이미지 설정 (원본 유지) */
        .item img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* 세로로 쌓기 */
                align-items: center;
            }
            .item {
                flex: 0 1 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item">
            <a href="https://cafe.naver.com/kpp2020" target="_blank">
                <img src="LOGO.jpg" alt="KPPA HOMEPAGE">
            </a>
        </div>
        
        <div class="item">
            <a href="https://drive.google.com/file/d/1rTkixNOmKTtMw90QlI8aVMbR87HN5KVZ/view?usp=drive_link" target="_blank">
                <img src="DOWNLOAD.jpg" alt="KPPA_RIGHTS_GUIDE_2026">
            </a>
        </div>
    </div>

</body>
</html>
