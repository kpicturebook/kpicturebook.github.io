<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 갤러리</title>
    <style>
        /* 전체 컨테이너 설정 */
        .container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; /* 가로 가운데 정렬 */
            gap: 40px; /* 칸 사이 간격 (조정 가능) */
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 각 칸(아이템) 설정 */
        .item {
            display: flex;
            justify-content: center; /* 이미지 원본 유지 시 칸 내부에서도 가운데 정렬 */
            flex: 0 1 calc(50% - 40px); 
            box-sizing: border-box;
        }

        /* 이미지 설정: 원본 사이즈 유지 버전 */
        .item img {
            max-width: 100%; /* 화면보다 이미지가 클 경우에만 줄어듦 (원본 유지) */
            height: auto; /* 비율 유지 */
            display: block;
            border-radius: 8px;
        }

        /* 모바일 대응: 화면이 작아지면 1줄에 1칸으로 변경 */
        @media (max-width: 768px) {
            .item {
                flex: 0 1 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item">
            <a href="https://cafe.naver.com/kpp2020" target="_blank">
                <img src="LOGO.jpg" alt="KPPA HOMEPAGE">
            </a>
        </div>
        
        <div class="item">
            <a href="https://drive.google.com/file/d/1rTkixNOmKTtMw90QlI8aVMbR87HN5KVZ/view?usp=drive_link" target="_blank">
                <img src="DOWNLOAD.jpg" alt="KPPA_RIGHTS_GUIDE_2026">
            </a>
        </div>
    </div>

</body>
</html>
